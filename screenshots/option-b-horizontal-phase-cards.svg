<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="750" viewBox="0 0 1000 750">
  <!-- Background -->
  <rect width="1000" height="750" fill="#12100e"/>

  <!-- Title -->
  <text x="500" y="40" fill="#c4703f" font-family="Georgia, serif" font-size="12" font-weight="600" text-anchor="middle" letter-spacing="3">OPTION B: HORIZONTAL PHASE CARDS (CAROUSEL)</text>
  <text x="500" y="62" fill="#7a6f62" font-family="system-ui" font-size="11" text-anchor="middle">Swipeable cards per phase. Each card shows key tasks grouped by domain. Clear, linear, no zigzag.</text>

  <!-- Section header -->
  <text x="500" y="110" fill="#c4703f" font-family="system-ui" font-size="11" font-weight="600" text-anchor="middle" letter-spacing="2">THE FULL PICTURE</text>
  <text x="500" y="140" fill="#ede6dc" font-family="Georgia, serif" font-size="28" font-weight="700" text-anchor="middle">Everything that's coming, mapped</text>

  <!-- Domain filter chips -->
  <rect x="265" y="160" width="72" height="26" rx="13" fill="rgba(196,112,63,0.15)" stroke="#c4703f" stroke-width="1"/>
  <circle cx="280" cy="173" r="3" fill="#c4703f"/>
  <text x="290" y="177" fill="#c4703f" font-family="system-ui" font-size="9" font-weight="500">Health</text>

  <rect x="345" y="160" width="72" height="26" rx="13" fill="transparent" stroke="rgba(237,230,220,0.08)" stroke-width="1"/>
  <circle cx="360" cy="173" r="3" fill="#d4a853"/>
  <text x="370" y="177" fill="#7a6f62" font-family="system-ui" font-size="9">Budget</text>

  <rect x="425" y="160" width="85" height="26" rx="13" fill="transparent" stroke="rgba(237,230,220,0.08)" stroke-width="1"/>
  <circle cx="440" cy="173" r="3" fill="#b85c30"/>
  <text x="450" y="177" fill="#7a6f62" font-family="system-ui" font-size="9">Childcare</text>

  <rect x="518" y="160" width="100" height="26" rx="13" fill="transparent" stroke="rgba(237,230,220,0.08)" stroke-width="1"/>
  <circle cx="533" cy="173" r="3" fill="#d4a060"/>
  <text x="543" y="177" fill="#7a6f62" font-family="system-ui" font-size="9">Relationship</text>

  <rect x="626" y="160" width="82" height="26" rx="13" fill="transparent" stroke="rgba(237,230,220,0.08)" stroke-width="1"/>
  <circle cx="641" cy="173" r="3" fill="#a07050"/>
  <text x="651" y="177" fill="#7a6f62" font-family="system-ui" font-size="9">Logistics</text>

  <!-- Horizontal progress line -->
  <line x1="50" y1="220" x2="950" y2="220" stroke="#4a4239" stroke-width="1"/>
  <line x1="50" y1="220" x2="350" y2="220" stroke="#c4703f" stroke-width="2"/>
  <!-- Phase dots on progress line -->
  <circle cx="100" cy="220" r="5" fill="#c4703f"/>
  <circle cx="250" cy="220" r="5" fill="#c4703f"/>
  <circle cx="400" cy="220" r="7" fill="#c4703f" stroke="#d4a853" stroke-width="2"/>
  <circle cx="550" cy="220" r="4" fill="none" stroke="#4a4239" stroke-width="1.5"/>
  <circle cx="700" cy="220" r="4" fill="none" stroke="#4a4239" stroke-width="1.5"/>
  <circle cx="850" cy="220" r="4" fill="none" stroke="#4a4239" stroke-width="1.5"/>

  <text x="100" y="212" fill="#7a6f62" font-family="system-ui" font-size="9" text-anchor="middle">T1</text>
  <text x="250" y="212" fill="#7a6f62" font-family="system-ui" font-size="9" text-anchor="middle">T2</text>
  <text x="400" y="212" fill="#c4703f" font-family="system-ui" font-size="9" font-weight="600" text-anchor="middle">T3</text>
  <text x="550" y="212" fill="#4a4239" font-family="system-ui" font-size="9" text-anchor="middle">Birth</text>
  <text x="700" y="212" fill="#4a4239" font-family="system-ui" font-size="9" text-anchor="middle">0-3mo</text>
  <text x="850" y="212" fill="#4a4239" font-family="system-ui" font-size="9" text-anchor="middle">3-12mo</text>

  <!-- Main card: Third Trimester (currently viewed) -->
  <rect x="100" y="245" width="800" height="420" rx="16" fill="#1a1714" stroke="rgba(196,112,63,0.15)" stroke-width="1"/>

  <!-- Card header -->
  <text x="140" y="290" fill="#ede6dc" font-family="Georgia, serif" font-size="24" font-weight="700">Third Trimester</text>
  <text x="140" y="312" fill="#7a6f62" font-family="system-ui" font-size="12">Weeks 28-40 · 15 tasks across 5 domains</text>

  <!-- Peek of previous card (left edge) -->
  <rect x="20" y="255" width="65" height="400" rx="12" fill="#1a1714" opacity="0.5" stroke="rgba(237,230,220,0.04)" stroke-width="1"/>
  <text x="52" y="400" fill="#4a4239" font-family="system-ui" font-size="10" text-anchor="middle" transform="rotate(-90, 52, 400)">Second Trimester</text>

  <!-- Peek of next card (right edge) -->
  <rect x="915" y="255" width="65" height="400" rx="12" fill="#1a1714" opacity="0.3" stroke="rgba(237,230,220,0.04)" stroke-width="1"/>
  <text x="947" y="400" fill="#4a4239" font-family="system-ui" font-size="10" text-anchor="middle" transform="rotate(-90, 947, 400)">Delivery</text>

  <!-- Domain groups inside card -->
  <!-- Health -->
  <circle cx="155" cy="348" r="5" fill="#c4703f"/>
  <text x="168" y="352" fill="#c4703f" font-family="system-ui" font-size="11" font-weight="600">Health</text>

  <rect x="140" y="365" width="340" height="44" rx="8" fill="#201c18"/>
  <text x="160" y="385" fill="#ede6dc" font-family="system-ui" font-size="12" font-weight="500">Glucose Screening Test</text>
  <text x="160" y="400" fill="#7a6f62" font-family="system-ui" font-size="10">Schedule between weeks 24-28</text>

  <rect x="140" y="418" width="340" height="44" rx="8" fill="#201c18"/>
  <text x="160" y="438" fill="#ede6dc" font-family="system-ui" font-size="12" font-weight="500">Tdap Vaccine</text>
  <text x="160" y="453" fill="#7a6f62" font-family="system-ui" font-size="10">Recommended weeks 27-36</text>

  <rect x="140" y="471" width="340" height="44" rx="8" fill="#201c18"/>
  <text x="160" y="491" fill="#ede6dc" font-family="system-ui" font-size="12" font-weight="500">Kick Count Tracking</text>
  <text x="160" y="506" fill="#7a6f62" font-family="system-ui" font-size="10">Start daily from week 28</text>

  <!-- Budget -->
  <circle cx="535" cy="348" r="5" fill="#d4a853"/>
  <text x="548" y="352" fill="#d4a853" font-family="system-ui" font-size="11" font-weight="600">Budget</text>

  <rect x="520" y="365" width="350" height="44" rx="8" fill="#201c18"/>
  <text x="540" y="385" fill="#ede6dc" font-family="system-ui" font-size="12" font-weight="500">Hospital Bag Shopping</text>
  <text x="540" y="400" fill="#7a6f62" font-family="system-ui" font-size="10">Est. $150-$300</text>

  <rect x="520" y="418" width="350" height="44" rx="8" fill="#201c18"/>
  <text x="540" y="438" fill="#ede6dc" font-family="system-ui" font-size="12" font-weight="500">Nursery Setup</text>
  <text x="540" y="453" fill="#7a6f62" font-family="system-ui" font-size="10">Crib, changing table, storage · Est. $800-$2000</text>

  <!-- Logistics -->
  <circle cx="535" cy="488" r="5" fill="#a07050"/>
  <text x="548" y="492" fill="#a07050" font-family="system-ui" font-size="11" font-weight="600">Logistics</text>

  <rect x="520" y="505" width="350" height="44" rx="8" fill="#201c18"/>
  <text x="540" y="525" fill="#ede6dc" font-family="system-ui" font-size="12" font-weight="500">Install Car Seat</text>
  <text x="540" y="540" fill="#7a6f62" font-family="system-ui" font-size="10">Schedule inspection at local fire station</text>

  <!-- Relationship -->
  <circle cx="155" cy="535" r="5" fill="#d4a060"/>
  <text x="168" y="539" fill="#d4a060" font-family="system-ui" font-size="11" font-weight="600">Relationship</text>

  <rect x="140" y="552" width="340" height="44" rx="8" fill="#201c18"/>
  <text x="160" y="572" fill="#ede6dc" font-family="system-ui" font-size="12" font-weight="500">Discuss Birth Plan Together</text>
  <text x="160" y="587" fill="#7a6f62" font-family="system-ui" font-size="10">Align on preferences, pain management, roles</text>

  <!-- Card footer -->
  <text x="500" y="640" fill="#7a6f62" font-family="system-ui" font-size="11" text-anchor="middle">+4 more tasks in this phase</text>

  <!-- Swipe indicator -->
  <text x="500" y="700" fill="#4a4239" font-family="system-ui" font-size="11" text-anchor="middle">&#x2190;  Swipe to explore phases  &#x2192;</text>
</svg>