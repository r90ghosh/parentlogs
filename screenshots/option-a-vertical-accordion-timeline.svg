<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="900" viewBox="0 0 1000 900">
  <defs>
    <filter id="glow1">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="900" fill="#12100e"/>

  <!-- Title -->
  <text x="500" y="40" fill="#c4703f" font-family="Georgia, serif" font-size="12" font-weight="600" text-anchor="middle" letter-spacing="3">OPTION A: VERTICAL CARD TIMELINE</text>
  <text x="500" y="65" fill="#7a6f62" font-family="system-ui" font-size="11" text-anchor="middle">Each phase is a card with tasks visible. No zigzag confusion. Click cards to expand.</text>

  <!-- Section header -->
  <text x="500" y="110" fill="#c4703f" font-family="system-ui" font-size="11" font-weight="600" text-anchor="middle" letter-spacing="2">THE FULL PICTURE</text>
  <text x="500" y="140" fill="#ede6dc" font-family="Georgia, serif" font-size="28" font-weight="700" text-anchor="middle">Everything that's coming, mapped</text>
  <text x="500" y="165" fill="#7a6f62" font-family="system-ui" font-size="13" text-anchor="middle">From the first appointment to toddlerhood</text>

  <!-- Vertical timeline line -->
  <line x1="160" y1="200" x2="160" y2="850" stroke="#c4703f" stroke-width="2" opacity="0.2"/>

  <!-- Phase 1: First Trimester (expanded) -->
  <circle cx="160" cy="220" r="8" fill="#c4703f" filter="url(#glow1)"/>
  <text x="160" y="224" fill="#12100e" font-family="system-ui" font-size="9" font-weight="700" text-anchor="middle">1</text>

  <rect x="200" y="195" width="720" height="190" rx="12" fill="#1a1714" stroke="rgba(196,112,63,0.2)" stroke-width="1"/>

  <!-- Phase header -->
  <text x="230" y="225" fill="#ede6dc" font-family="Georgia, serif" font-size="18" font-weight="700">First Trimester</text>
  <text x="230" y="243" fill="#7a6f62" font-family="system-ui" font-size="11">Weeks 1-13 · 8 key tasks</text>

  <!-- Task cards inside (2x3 grid) -->
  <rect x="230" y="260" width="210" height="54" rx="8" fill="#201c18" stroke="rgba(237,230,220,0.06)" stroke-width="1"/>
  <circle cx="250" cy="280" r="4" fill="#c4703f"/>
  <text x="262" y="277" fill="#ede6dc" font-family="system-ui" font-size="11" font-weight="500">First Doctor Visit</text>
  <text x="262" y="293" fill="#7a6f62" font-family="system-ui" font-size="9">Health · Week 8</text>

  <rect x="455" y="260" width="210" height="54" rx="8" fill="#201c18" stroke="rgba(237,230,220,0.06)" stroke-width="1"/>
  <circle cx="475" cy="280" r="4" fill="#d4a853"/>
  <text x="487" y="277" fill="#ede6dc" font-family="system-ui" font-size="11" font-weight="500">Set Baby Budget</text>
  <text x="487" y="293" fill="#7a6f62" font-family="system-ui" font-size="9">Budget · Week 10</text>

  <rect x="680" y="260" width="210" height="54" rx="8" fill="#201c18" stroke="rgba(237,230,220,0.06)" stroke-width="1"/>
  <circle cx="700" cy="280" r="4" fill="#d4a060"/>
  <text x="712" y="277" fill="#ede6dc" font-family="system-ui" font-size="11" font-weight="500">Share the News</text>
  <text x="712" y="293" fill="#7a6f62" font-family="system-ui" font-size="9">Relationship · Week 12</text>

  <rect x="230" y="325" width="210" height="54" rx="8" fill="#201c18" stroke="rgba(237,230,220,0.06)" stroke-width="1"/>
  <circle cx="250" cy="345" r="4" fill="#b85c30"/>
  <text x="262" y="342" fill="#ede6dc" font-family="system-ui" font-size="11" font-weight="500">Research Childcare</text>
  <text x="262" y="358" fill="#7a6f62" font-family="system-ui" font-size="9">Childcare · Week 11</text>

  <rect x="455" y="325" width="210" height="54" rx="8" fill="#201c18" stroke="rgba(237,230,220,0.06)" stroke-width="1"/>
  <circle cx="475" cy="345" r="4" fill="#a07050"/>
  <text x="487" y="342" fill="#ede6dc" font-family="system-ui" font-size="11" font-weight="500">Prenatal Vitamins</text>
  <text x="487" y="358" fill="#7a6f62" font-family="system-ui" font-size="9">Logistics · Week 6</text>

  <text x="783" y="355" fill="#c4703f" font-family="system-ui" font-size="11" font-weight="500" text-anchor="middle">+3 more</text>

  <!-- Phase 2: Second Trimester (collapsed) -->
  <circle cx="160" cy="420" r="8" fill="#201c18" stroke="#c4703f" stroke-width="1.5"/>
  <text x="160" y="424" fill="#c4703f" font-family="system-ui" font-size="9" font-weight="700" text-anchor="middle">2</text>

  <rect x="200" y="400" width="720" height="60" rx="12" fill="#1a1714" stroke="rgba(237,230,220,0.06)" stroke-width="1"/>
  <text x="230" y="430" fill="#ede6dc" font-family="Georgia, serif" font-size="16" font-weight="700">Second Trimester</text>
  <text x="230" y="448" fill="#7a6f62" font-family="system-ui" font-size="11">Weeks 14-27 · 12 key tasks</text>

  <!-- Domain dots preview -->
  <circle cx="810" cy="422" r="4" fill="#c4703f"/>
  <circle cx="823" cy="422" r="4" fill="#d4a853"/>
  <circle cx="836" cy="422" r="4" fill="#b85c30"/>
  <circle cx="849" cy="422" r="4" fill="#d4a060"/>
  <circle cx="862" cy="422" r="4" fill="#a07050"/>
  <text x="887" y="426" fill="#7a6f62" font-family="system-ui" font-size="16">&#x276F;</text>
  <text x="836" y="450" fill="#7a6f62" font-family="system-ui" font-size="9" text-anchor="middle">Click to expand</text>

  <!-- Phase 3: Third Trimester (collapsed) -->
  <circle cx="160" cy="500" r="8" fill="#201c18" stroke="#c4703f" stroke-width="1.5"/>
  <text x="160" y="504" fill="#c4703f" font-family="system-ui" font-size="9" font-weight="700" text-anchor="middle">3</text>

  <rect x="200" y="480" width="720" height="60" rx="12" fill="#1a1714" stroke="rgba(237,230,220,0.06)" stroke-width="1"/>
  <text x="230" y="510" fill="#ede6dc" font-family="Georgia, serif" font-size="16" font-weight="700">Third Trimester</text>
  <text x="230" y="528" fill="#7a6f62" font-family="system-ui" font-size="11">Weeks 28-40 · 15 key tasks</text>
  <circle cx="810" cy="502" r="4" fill="#c4703f"/>
  <circle cx="823" cy="502" r="4" fill="#d4a853"/>
  <circle cx="836" cy="502" r="4" fill="#b85c30"/>
  <circle cx="849" cy="502" r="4" fill="#d4a060"/>
  <circle cx="862" cy="502" r="4" fill="#a07050"/>
  <text x="887" y="506" fill="#7a6f62" font-family="system-ui" font-size="16">&#x276F;</text>

  <!-- Phase 4: Delivery -->
  <circle cx="160" cy="580" r="8" fill="#201c18" stroke="#c4703f" stroke-width="1.5"/>
  <text x="160" y="584" fill="#c4703f" font-family="system-ui" font-size="9" font-weight="700" text-anchor="middle">4</text>

  <rect x="200" y="560" width="720" height="60" rx="12" fill="#1a1714" stroke="rgba(237,230,220,0.06)" stroke-width="1"/>
  <text x="230" y="590" fill="#ede6dc" font-family="Georgia, serif" font-size="16" font-weight="700">Delivery &amp; Birth</text>
  <text x="230" y="608" fill="#7a6f62" font-family="system-ui" font-size="11">Hospital bag, birth plan · 10 key tasks</text>
  <circle cx="810" cy="582" r="4" fill="#c4703f"/>
  <circle cx="823" cy="582" r="4" fill="#a07050"/>
  <text x="887" y="586" fill="#7a6f62" font-family="system-ui" font-size="16">&#x276F;</text>

  <!-- Phase 5: 0-3 Months -->
  <circle cx="160" cy="660" r="8" fill="#201c18" stroke="#4a4239" stroke-width="1.5"/>
  <text x="160" y="664" fill="#4a4239" font-family="system-ui" font-size="9" font-weight="700" text-anchor="middle">5</text>

  <rect x="200" y="640" width="720" height="60" rx="12" fill="#1a1714" stroke="rgba(237,230,220,0.04)" stroke-width="1"/>
  <text x="230" y="670" fill="#7a6f62" font-family="Georgia, serif" font-size="16" font-weight="700">First 3 Months</text>
  <text x="230" y="688" fill="#4a4239" font-family="system-ui" font-size="11">Newborn essentials · 14 key tasks</text>

  <!-- Phase 6: 3-12 Months -->
  <circle cx="160" cy="740" r="8" fill="#201c18" stroke="#4a4239" stroke-width="1.5"/>
  <text x="160" y="744" fill="#4a4239" font-family="system-ui" font-size="9" font-weight="700" text-anchor="middle">6</text>

  <rect x="200" y="720" width="720" height="60" rx="12" fill="#1a1714" stroke="rgba(237,230,220,0.04)" stroke-width="1"/>
  <text x="230" y="750" fill="#7a6f62" font-family="Georgia, serif" font-size="16" font-weight="700">3-12 Months</text>
  <text x="230" y="768" fill="#4a4239" font-family="system-ui" font-size="11">Growing baby milestones · 18 key tasks</text>

  <!-- Benefits callout -->
  <rect x="200" y="810" width="720" height="50" rx="10" fill="rgba(196,112,63,0.08)" stroke="rgba(196,112,63,0.15)" stroke-width="1"/>
  <text x="560" y="840" fill="#c4703f" font-family="system-ui" font-size="12" font-weight="600" text-anchor="middle">67 task previews · 6 phases · 5 life domains — all mapped before you sign up</text>
</svg>