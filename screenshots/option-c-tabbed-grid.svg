<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="850" viewBox="0 0 1000 850">
  <!-- Background -->
  <rect width="1000" height="850" fill="#12100e"/>

  <!-- Title -->
  <text x="500" y="40" fill="#c4703f" font-family="Georgia, serif" font-size="12" font-weight="600" text-anchor="middle" letter-spacing="3">OPTION C: TABBED PHASE VIEW WITH TASK GRID</text>
  <text x="500" y="62" fill="#7a6f62" font-family="system-ui" font-size="11" text-anchor="middle">Phase tabs at top, task grid below. Most information-dense. Familiar tab pattern.</text>

  <!-- Section header -->
  <text x="500" y="108" fill="#c4703f" font-family="system-ui" font-size="11" font-weight="600" text-anchor="middle" letter-spacing="2">THE FULL PICTURE</text>
  <text x="500" y="138" fill="#ede6dc" font-family="Georgia, serif" font-size="28" font-weight="700" text-anchor="middle">Everything that's coming, mapped</text>

  <!-- Phase tabs -->
  <rect x="60" y="165" width="880" height="48" rx="12" fill="#1a1714" stroke="rgba(237,230,220,0.06)" stroke-width="1"/>

  <!-- Tab: T1 -->
  <rect x="68" y="173" width="115" height="32" rx="8" fill="transparent"/>
  <text x="125" y="193" fill="#7a6f62" font-family="system-ui" font-size="12" font-weight="500" text-anchor="middle">Trimester 1</text>

  <!-- Tab: T2 -->
  <rect x="190" y="173" width="120" height="32" rx="8" fill="transparent"/>
  <text x="250" y="193" fill="#7a6f62" font-family="system-ui" font-size="12" font-weight="500" text-anchor="middle">Trimester 2</text>

  <!-- Tab: T3 (ACTIVE) -->
  <rect x="317" y="173" width="120" height="32" rx="8" fill="#c4703f"/>
  <text x="377" y="193" fill="#faf6f0" font-family="system-ui" font-size="12" font-weight="600" text-anchor="middle">Trimester 3</text>

  <!-- Tab: Delivery -->
  <rect x="444" y="173" width="100" height="32" rx="8" fill="transparent"/>
  <text x="494" y="193" fill="#7a6f62" font-family="system-ui" font-size="12" font-weight="500" text-anchor="middle">Delivery</text>

  <!-- Tab: 0-3 Months -->
  <rect x="551" y="173" width="110" height="32" rx="8" fill="transparent"/>
  <text x="606" y="193" fill="#4a4239" font-family="system-ui" font-size="12" font-weight="500" text-anchor="middle">0-3 Months</text>

  <!-- Tab: 3-12 Months -->
  <rect x="668" y="173" width="120" height="32" rx="8" fill="transparent"/>
  <text x="728" y="193" fill="#4a4239" font-family="system-ui" font-size="12" font-weight="500" text-anchor="middle">3-12 Months</text>

  <!-- Tab: 12+ -->
  <rect x="795" y="173" width="85" height="32" rx="8" fill="transparent"/>
  <text x="837" y="193" fill="#4a4239" font-family="system-ui" font-size="12" font-weight="500" text-anchor="middle">12+ mo</text>

  <!-- Content area: Third Trimester -->
  <text x="100" y="250" fill="#ede6dc" font-family="Georgia, serif" font-size="20" font-weight="700">Third Trimester</text>
  <text x="100" y="270" fill="#7a6f62" font-family="system-ui" font-size="12">Weeks 28-40 · 15 tasks to prepare for baby's arrival</text>

  <!-- Domain filter row -->
  <text x="100" y="305" fill="#7a6f62" font-family="system-ui" font-size="10" font-weight="600" letter-spacing="1">FILTER BY DOMAIN</text>
  <rect x="100" y="315" width="58" height="22" rx="11" fill="rgba(196,112,63,0.15)" stroke="#c4703f" stroke-width="1"/>
  <text x="129" y="330" fill="#c4703f" font-family="system-ui" font-size="9" text-anchor="middle">All (15)</text>
  <rect x="165" y="315" width="70" height="22" rx="11" fill="transparent" stroke="rgba(237,230,220,0.08)" stroke-width="1"/>
  <circle cx="178" cy="326" r="3" fill="#c4703f"/>
  <text x="195" y="330" fill="#7a6f62" font-family="system-ui" font-size="9">Health</text>
  <rect x="242" y="315" width="70" height="22" rx="11" fill="transparent" stroke="rgba(237,230,220,0.08)" stroke-width="1"/>
  <circle cx="255" cy="326" r="3" fill="#d4a853"/>
  <text x="272" y="330" fill="#7a6f62" font-family="system-ui" font-size="9">Budget</text>
  <rect x="319" y="315" width="85" height="22" rx="11" fill="transparent" stroke="rgba(237,230,220,0.08)" stroke-width="1"/>
  <circle cx="332" cy="326" r="3" fill="#b85c30"/>
  <text x="352" y="330" fill="#7a6f62" font-family="system-ui" font-size="9">Childcare</text>

  <!-- Task cards grid (3 columns) -->
  <!-- Row 1 -->
  <rect x="60" y="355" width="280" height="120" rx="12" fill="#1a1714" stroke="rgba(237,230,220,0.06)" stroke-width="1"/>
  <rect x="60" y="355" width="280" height="3" rx="1.5" fill="#c4703f"/>
  <circle cx="85" cy="385" r="5" fill="#c4703f"/>
  <text x="97" y="389" fill="#c4703f" font-family="system-ui" font-size="10" font-weight="500">Health</text>
  <text x="80" y="415" fill="#ede6dc" font-family="Georgia, serif" font-size="14" font-weight="700">Glucose Screening</text>
  <text x="80" y="435" fill="#7a6f62" font-family="system-ui" font-size="10">Schedule your glucose</text>
  <text x="80" y="449" fill="#7a6f62" font-family="system-ui" font-size="10">tolerance test · Week 28</text>
  <text x="80" y="468" fill="#4a4239" font-family="system-ui" font-size="9">Week 24-28</text>

  <rect x="360" y="355" width="280" height="120" rx="12" fill="#1a1714" stroke="rgba(237,230,220,0.06)" stroke-width="1"/>
  <rect x="360" y="355" width="280" height="3" rx="1.5" fill="#d4a853"/>
  <circle cx="385" cy="385" r="5" fill="#d4a853"/>
  <text x="397" y="389" fill="#d4a853" font-family="system-ui" font-size="10" font-weight="500">Budget</text>
  <text x="380" y="415" fill="#ede6dc" font-family="Georgia, serif" font-size="14" font-weight="700">Hospital Bag</text>
  <text x="380" y="435" fill="#7a6f62" font-family="system-ui" font-size="10">Pack essentials for mom,</text>
  <text x="380" y="449" fill="#7a6f62" font-family="system-ui" font-size="10">dad, and baby · $150-$300</text>
  <text x="380" y="468" fill="#4a4239" font-family="system-ui" font-size="9">Week 35-36</text>

  <rect x="660" y="355" width="280" height="120" rx="12" fill="#1a1714" stroke="rgba(237,230,220,0.06)" stroke-width="1"/>
  <rect x="660" y="355" width="280" height="3" rx="1.5" fill="#a07050"/>
  <circle cx="685" cy="385" r="5" fill="#a07050"/>
  <text x="697" y="389" fill="#a07050" font-family="system-ui" font-size="10" font-weight="500">Logistics</text>
  <text x="680" y="415" fill="#ede6dc" font-family="Georgia, serif" font-size="14" font-weight="700">Install Car Seat</text>
  <text x="680" y="435" fill="#7a6f62" font-family="system-ui" font-size="10">Get it inspected at your</text>
  <text x="680" y="449" fill="#7a6f62" font-family="system-ui" font-size="10">local fire station</text>
  <text x="680" y="468" fill="#4a4239" font-family="system-ui" font-size="9">Week 36-37</text>

  <!-- Row 2 -->
  <rect x="60" y="490" width="280" height="120" rx="12" fill="#1a1714" stroke="rgba(237,230,220,0.06)" stroke-width="1"/>
  <rect x="60" y="490" width="280" height="3" rx="1.5" fill="#d4a060"/>
  <circle cx="85" cy="520" r="5" fill="#d4a060"/>
  <text x="97" y="524" fill="#d4a060" font-family="system-ui" font-size="10" font-weight="500">Relationship</text>
  <text x="80" y="550" fill="#ede6dc" font-family="Georgia, serif" font-size="14" font-weight="700">Birth Plan Discussion</text>
  <text x="80" y="570" fill="#7a6f62" font-family="system-ui" font-size="10">Align on preferences, pain</text>
  <text x="80" y="584" fill="#7a6f62" font-family="system-ui" font-size="10">management, and roles</text>
  <text x="80" y="603" fill="#4a4239" font-family="system-ui" font-size="9">Week 30-34</text>

  <rect x="360" y="490" width="280" height="120" rx="12" fill="#1a1714" stroke="rgba(237,230,220,0.06)" stroke-width="1"/>
  <rect x="360" y="490" width="280" height="3" rx="1.5" fill="#c4703f"/>
  <circle cx="385" cy="520" r="5" fill="#c4703f"/>
  <text x="397" y="524" fill="#c4703f" font-family="system-ui" font-size="10" font-weight="500">Health</text>
  <text x="380" y="550" fill="#ede6dc" font-family="Georgia, serif" font-size="14" font-weight="700">Tdap Vaccine</text>
  <text x="380" y="570" fill="#7a6f62" font-family="system-ui" font-size="10">Recommended between</text>
  <text x="380" y="584" fill="#7a6f62" font-family="system-ui" font-size="10">weeks 27 and 36</text>
  <text x="380" y="603" fill="#4a4239" font-family="system-ui" font-size="9">Week 27-36</text>

  <rect x="660" y="490" width="280" height="120" rx="12" fill="#1a1714" stroke="rgba(237,230,220,0.06)" stroke-width="1"/>
  <rect x="660" y="490" width="280" height="3" rx="1.5" fill="#d4a853"/>
  <circle cx="685" cy="520" r="5" fill="#d4a853"/>
  <text x="697" y="524" fill="#d4a853" font-family="system-ui" font-size="10" font-weight="500">Budget</text>
  <text x="680" y="550" fill="#ede6dc" font-family="Georgia, serif" font-size="14" font-weight="700">Nursery Setup</text>
  <text x="680" y="570" fill="#7a6f62" font-family="system-ui" font-size="10">Crib, changing table,</text>
  <text x="680" y="584" fill="#7a6f62" font-family="system-ui" font-size="10">storage · Est. $800-$2000</text>
  <text x="680" y="603" fill="#4a4239" font-family="system-ui" font-size="9">Week 28-34</text>

  <!-- Show more -->
  <rect x="350" y="630" width="300" height="40" rx="20" fill="transparent" stroke="rgba(196,112,63,0.3)" stroke-width="1"/>
  <text x="500" y="654" fill="#c4703f" font-family="system-ui" font-size="12" font-weight="500" text-anchor="middle">Show 9 more tasks in this phase</text>

  <!-- Stats footer -->
  <text x="500" y="720" fill="#7a6f62" font-family="system-ui" font-size="11" text-anchor="middle">67 task previews · 7 phases · 5 life domains</text>

  <!-- CTA -->
  <rect x="380" y="745" width="240" height="44" rx="8" fill="#c4703f"/>
  <text x="500" y="772" fill="#12100e" font-family="system-ui" font-size="13" font-weight="600" text-anchor="middle" letter-spacing="1">GET STARTED FREE  &#x2192;</text>
</svg>